<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Recargas</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Recargas VE</h1>

    <form id="vehicleForm" class="card">
      <input id="matricula" type="text" placeholder="Matrícula" maxlength="20" required />
      <input id="mapsUrl" type="url" placeholder="Enlace de Google Maps" required />
      <textarea id="notas" placeholder="Notas"></textarea>
      <button id="vehicleSubmitButton" type="submit">Añadir vehículo</button>
      <button id="cancelEditButton" class="secondary" type="button" hidden>Cancelar edición</button>
    </form>

    <section class="map-section" aria-labelledby="mapTitle">
      <h2 id="mapTitle">
        <button
          id="mapToggle"
          class="section-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="mapContent"
        >
          <span>Mapa de vehículos</span>
          <span class="section-toggle-icon" aria-hidden="true">▾</span>
        </button>
      </h2>
      <div id="mapContent" class="card map-card" hidden>
        <div id="vehiclesMap" class="vehicles-map" aria-label="Mapa con la posición de los vehículos"></div>
      </div>
    </section>

    <section>
      <h2>
        <button
          id="vehiclesToggle"
          class="section-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="vehicleList"
        >
          <span>Veh (<span id="vehiclesCount">0</span>)</span>
          <span
            id="sortByDistanceButton"
            class="sort-by-distance-button"
            role="button"
            tabindex="0"
          >Ordenar</span>
          <span
            id="deleteAllVehiclesButton"
            class="delete-all-vehicles-button"
            role="button"
            tabindex="0"
          >Borrar</span>
          <span class="section-toggle-icon" aria-hidden="true">▾</span>
        </button>
      </h2>
      <div id="vehicleList" class="vehicle-list" hidden></div>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  ></script>
  <script src="app.js"></script>
</body>
</html>
